services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${DATABASE}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=localhost
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DATABASE=${DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
    depends_on: 
      db: 
        condition:
          service_healthy
    volumes:
      - .:/app 
    restart: unless-stopped

  test:
    build: .
    command: pytest -v --asyncio-mode=auto
    volumes:
      - .:/app
    env_file:
      - .env

volumes:
  postgres_data: